<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}FuturesML{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <a class="brand" href="/exchanges">
        <span class="brand-mark">F</span>
        <span>FuturesML</span>
      </a>
      <nav class="nav flex-column gap-1">
        <a class="nav-link {{ 'active' if request.url.path.startswith('/exchanges') else '' }}" href="/exchanges">Exchanges</a>
        <a class="nav-link {{ 'active' if request.url.path.startswith('/market-data') else '' }}" href="/market-data">Market Data</a>
        <a class="nav-link {{ 'active' if request.url.path.startswith('/ml-training') else '' }}" href="/ml-training">ML Training</a>
      </nav>
    </aside>
    <main class="main">
      <header class="topbar">
        <div>
          <div class="eyebrow">Stage 1</div>
          <h1>{% block heading %}Exchange Credentials{% endblock %}</h1>
        </div>
        {% block actions %}{% endblock %}
      </header>
      {% block content %}{% endblock %}
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
